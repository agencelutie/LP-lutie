<!DOCTYPE html>

<style>
  :root {
    --dm-blue: #2C6BD2;
    --dm-blue-dark: #1B4FA8;
    --dm-blue-soft: #D7E6FF;
    --dm-bg: #F7F7F8;
    --dm-ink: #1a1a1a;
    --dm-ink-2: #4a4a4a;
    --dm-line: #2b2b2b;
    --dm-line-soft: #c2c2c2;
    --dm-paper: #FBFAF6;
    --dm-yellow: #FFE45C;
    --dm-green: #34C26A;
    --dm-red: #E45858;
  }
  html, body { margin: 0; padding: 0; background: #ECECEE; font-family: 'Inter', sans-serif; color: var(--dm-ink); }
  .sk-box { border: 1.5px solid var(--dm-line); border-radius: 6px; background: white; }
  .sk-box.dashed { border-style: dashed; }
  .sk-box.soft { border-color: var(--dm-line-soft); }
  .sk-pill { border: 1.5px solid var(--dm-line); border-radius: 999px; padding: 4px 10px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: white; }
  .sk-btn { border: 1.5px solid var(--dm-line); border-radius: 6px; padding: 10px 16px; background: var(--dm-blue); color: white; font-weight: 600; font-size: 13px; box-shadow: 3px 3px 0 var(--dm-line); display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
  .sk-btn.ghost { background: white; color: var(--dm-ink); }
  .sk-btn.sm { padding: 6px 10px; font-size: 11px; box-shadow: 2px 2px 0 var(--dm-line); }
  .sk-img { background: repeating-linear-gradient(135deg, #eee 0 8px, #f7f7f7 8px 16px); border: 1.5px dashed var(--dm-line-soft); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #888; text-align: center; padding: 6px; }
  .sk-handwrite { font-family: 'Kalam', cursive; }
  .sk-annot { font-family: 'Caveat', cursive; color: var(--dm-blue); font-size: 18px; }
  .sk-mono { font-family: 'JetBrains Mono', monospace; }
  .squiggle { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 6'><path d='M0 3 Q 7.5 0 15 3 T 30 3 T 45 3 T 60 3' stroke='%232C6BD2' stroke-width='1.5' fill='none'/></svg>"); background-repeat: repeat-x; background-position: 0 100%; background-size: 60px 6px; padding-bottom: 4px; }
  .dm-logo { font-family: 'Inter'; font-weight: 800; letter-spacing: -0.02em; font-size: 18px; }
  .dm-logo .dot { color: var(--dm-blue); }
  .artboard-scroll { overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; }
  .artboard-scroll::-webkit-scrollbar { width: 6px; }
  .artboard-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  .phone-frame { width: 360px; height: 740px; border: 12px solid #1a1a1a; border-radius: 36px; background: white; overflow: hidden; position: relative; box-shadow: 6px 6px 0 #1a1a1a; }
  .phone-frame::before { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 90px; height: 18px; border-radius: 9px; background: #1a1a1a; z-index: 10; }
  .phone-screen { width: 100%; height: 100%; overflow-y: auto; background: white; }
  .swipe-dots { display: flex; gap: 6px; }
  .swipe-dots .d { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
  .swipe-dots .d.active { background: var(--dm-blue); width: 18px; border-radius: 3px; }
</style>

<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<div id="root"></div>

<script type="text/babel">
// ── design-canvas.jsx ──────────────────────────────────────────
const DC = {
  bg: '#f0eee9', grid: 'rgba(0,0,0,0.06)', label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)', subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8', postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

if (!document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  const [ready, setReady] = React.useState(true);
  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  const registry = {};
  const sectionMeta = {};
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px,${y}px,0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;
    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };
    const isMouseWheel = (e) => e.deltaMode !== 0 || (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);
    let isGesturing = false;
    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return;
      if (e.ctrlKey) { zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01)); }
      else if (isMouseWheel(e)) { zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18)); }
      else { tf.current.x -= e.deltaX; tf.current.y -= e.deltaY; apply(); }
    };
    let gsBase = 1;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => { e.preventDefault(); zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale); };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null; vp.style.cursor = '';
    };
    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div ref={vpRef} className="design-canvas" style={{ height:'100vh',width:'100vw',background:DC.bg,overflow:'hidden',overscrollBehavior:'none',touchAction:'none',position:'relative',fontFamily:DC.font,boxSizing:'border-box',...style }}>
      <div ref={worldRef} style={{ position:'absolute',top:0,left:0,transformOrigin:'0 0',willChange:'transform',width:'max-content',minWidth:'100%',minHeight:'100%',padding:'60px 0 80px' }}>
        <div style={{ position:'absolute',inset:-6000,backgroundImage:gridSvg,backgroundSize:'120px 120px',pointerEvents:'none',zIndex:-1 }} />
        {children}
      </div>
    </div>
  );
}

function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};
  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);
  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));
  return (
    <div data-dc-section={sid} style={{ marginBottom:80,position:'relative' }}>
      <div style={{ padding:'0 60px 56px' }}>
        <div style={{ fontSize:28,fontWeight:600,color:DC.title,letterSpacing:-0.4,marginBottom:6,display:'inline-block' }}>{sec.title ?? title}</div>
        {subtitle && <div style={{ fontSize:16,color:DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display:'flex',gap,padding:'0 60px',alignItems:'flex-start',width:'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);
  return (
    <div ref={ref} data-dc-slot={id} style={{ position:'relative',flexShrink:0 }}>
      <div className="dc-labelrow" style={{ position:'absolute',bottom:'100%',left:-4,marginBottom:4,color:DC.label }}>
        <div className="dc-grip" title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <span className="dc-editable" style={{ fontSize:15,fontWeight:500,color:DC.label,lineHeight:1 }}>{label}</span>
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card" style={{ borderRadius:2,boxShadow:'0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)',overflow:'hidden',width,height,background:'#fff',...style }}>
        {children || <div style={{ height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#bbb',fontSize:13 }}>{id}</div>}
      </div>
    </div>
  );
}

function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);
  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });
  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)} style={{ position:'fixed',inset:0,zIndex:100,background:'rgba(24,20,16,.6)',backdropFilter:'blur(14px)',fontFamily:DC.font,color:'#fff' }}>
      <div onClick={(e) => e.stopPropagation()} style={{ position:'absolute',top:0,right:0,padding:16 }}>
        <button onClick={() => ctx.setFocus(null)} style={{ border:'none',background:'transparent',color:'rgba(255,255,255,.7)',width:32,height:32,borderRadius:16,fontSize:20,cursor:'pointer' }}>×</button>
      </div>
      <div style={{ position:'absolute',top:64,bottom:56,left:100,right:100,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width:width*scale,height:height*scale,position:'relative' }}>
          <div style={{ width,height,transform:`scale(${scale})`,transformOrigin:'top left',background:'#fff',borderRadius:2,overflow:'hidden',boxShadow:'0 20px 80px rgba(0,0,0,.4)' }}>
            {children}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize:14,fontWeight:500,opacity:.85,textAlign:'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity:.5,marginLeft:10 }}>{idx+1} / {peers.length}</span>
        </div>
      </div>
      <button onClick={(e) => { e.stopPropagation(); go(-1); }} style={{ position:'absolute',top:'50%',left:28,transform:'translateY(-50%)',border:'none',background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.9)',width:44,height:44,borderRadius:22,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>‹</button>
      <button onClick={(e) => { e.stopPropagation(); go(1); }} style={{ position:'absolute',top:'50%',right:28,transform:'translateY(-50%)',border:'none',background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.9)',width:44,height:44,borderRadius:22,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>›</button>
      <div onClick={(e) => e.stopPropagation()} style={{ position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)} style={{ border:'none',padding:0,cursor:'pointer',width:6,height:6,borderRadius:3,background:i===idx?'#fff':'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{ position:'absolute',top,left,right,bottom,width,background:DC.postitBg,padding:'14px 16px',fontFamily:'"Comic Sans MS","Marker Felt",cursive',fontSize:14,lineHeight:1.4,color:DC.postitText,boxShadow:'0 2px 8px rgba(0,0,0,.12)',transform:`rotate(${rotate}deg)`,zIndex:5 }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });
</script>

<script type="text/babel">
// ── tweaks-panel.jsx ───────────────────────────────────────────
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.9);color:#29261b;-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 system-ui,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}

`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(true);
  if (!open) return <button onClick={() => setOpen(true)} style={{ position:'fixed',right:16,bottom:16,zIndex:2147483646,border:'1.5px solid #2b2b2b',borderRadius:8,background:'white',padding:'8px 14px',cursor:'pointer',fontWeight:600,fontSize:12,boxShadow:'2px 2px 0 #2b2b2b' }}>⚙️ Tweaks</button>;

      <div className="twk-panel">
        <div className="twk-hd">
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, title, children }) {
  return <><div className="twk-sect">{label || title}</div>{children}</>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span style={{ opacity:.5 }}>{value}</span>}</div>
      {children}
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" style={{ width:'100%' }} min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" value={value} onChange={(e) => onChange(e.target.value)} style={{ width:40,height:22,border:'none',cursor:'pointer' }} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return <button type="button" style={{ height:26,padding:'0 12px',border:0,borderRadius:7,background:secondary?'rgba(0,0,0,.06)':'rgba(0,0,0,.78)',color:secondary?'inherit':'#fff',font:'inherit',fontWeight:500,cursor:'pointer' }} onClick={onClick}>{label}</button>;
}

<script type="text/babel">
// ── dm-app.jsx ─────────────────────────────────────────────────
const { useState: useStateA } = React;

function SwipeView({ children }) {
  const [idx, setIdx] = useStateA(0);
  const sections = React.Children.toArray(children);
  return (
    <div style={{ position:'relative',width:'100%',height:'100%',background:'white',overflow:'hidden' }}>
      <div style={{ position:'absolute',inset:0,display:'flex',alignItems:'stretch',justifyContent:'stretch' }}>
        <div style={{ width:'100%',height:'100%',overflowY:'auto' }} className="artboard-scroll">
          {sections[idx]}
        </div>
      </div>
      <SwipeChrome active={idx} total={sections.length} />
      <div style={{ position:'absolute',bottom:16,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8,zIndex:8 }}>
        <button onClick={() => setIdx(Math.max(0, idx-1))} style={{ width:36,height:36,borderRadius:'50%',border:'1.5px solid #2b2b2b',background:'white',cursor:'pointer' }}>↑</button>
        <button onClick={() => setIdx(Math.min(sections.length-1, idx+1))} style={{ width:36,height:36,borderRadius:'50%',border:'1.5px solid #2b2b2b',background:'#2C6BD2',color:'white',cursor:'pointer' }}>↓</button>
      </div>
    </div>
  );
}

function PhoneFrame({ children }) {
  return <div className="phone-frame"><div className="phone-screen">{children}</div></div>;
}

function DesignSystem() {
  return (
    <div style={{ padding:24,background:'#FBFAF6',height:'100%',overflowY:'auto' }} className="artboard-scroll">
      <h2 style={{ fontWeight:800,margin:'0 0 4px',fontSize:22 }}>Design system mid-fi</h2>
      <p style={{ fontSize:12,color:'#666',marginBottom:20 }}>Couleurs et composants partagés par les 4 directions.</p>
      <div style={{ display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,marginBottom:20 }}>
        {[['#2C6BD2','Blue 500'],['#1B4FA8','Blue 700'],['#D7E6FF','Blue 100'],['#1a1a1a','Ink'],['#FFE45C','Yellow'],['#FBFAF6','Paper']].map(([c,l]) => (
          <div key={c}>
            <div style={{ height:60,background:c,borderRadius:6,border:'1px solid #ddd' }} />
            <div style={{ fontSize:10,marginTop:4,fontFamily:'JetBrains Mono' }}>{c}</div>
            <div style={{ fontSize:10,color:'#888' }}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{ display:'flex',gap:8,marginBottom:12,flexWrap:'wrap' }}>
        <SkBtn>Primary CTA</SkBtn>
        <SkBtn ghost>Secondary</SkBtn>
        <SkBtn sm>Small</SkBtn>
        <SkPill>📍 Pill</SkPill>
        <SkPill style={{ background:'#FFE45C' }}>⚡ Yellow</SkPill>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks({ city:'lausanne', showSwipe:true, showMobile:true });
  const cityKey = tweaks.city || 'lausanne';
  const city = CITIES[cityKey];

  return (
    <>
      <DesignCanvas>
        <DCSection id="ds" title="Design system">
          <DCArtboard id="ds-1" label="Tokens & primitives" width={680} height={540}>
            <DesignSystem />
          </DCArtboard>
          <DCArtboard id="comp-calc" label="NEW · Calculateur d'économies" width={420} height={580}>
            <div style={{ padding:24,background:'#FBFAF6',height:'100%',boxSizing:'border-box' }}>
              <CalculateurEconomies />
            </div>
          </DCArtboard>
          <DCArtboard id="comp-comp" label="NEW · Comparateur tarifaire" width={620} height={380}>
            <div style={{ padding:24,background:'#FBFAF6',height:'100%',boxSizing:'border-box' }}>
              <ComparateurTarifaire />
            </div>
          </DCArtboard>
          <DCArtboard id="comp-rdv" label="NEW · RDV instantané" width={420} height={520}>
            <div style={{ padding:24,background:'#FBFAF6',height:'100%',boxSizing:'border-box' }}>
              <PriseRDV city={city} />
            </div>
          </DCArtboard>
          <DCArtboard id="comp-map" label="NEW · Carte cantonale" width={520} height={360}>
            <div style={{ padding:24,background:'#FBFAF6',height:'100%',boxSizing:'border-box' }}>
              <CantonMap activeCity={cityKey} />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="d1" title={`★ Direction 1 — Économies max · LP COMPLÈTE · ${city.name}`}>
          <DCArtboard id="d1-desktop" label="Desktop · LP complète" width={1280} height={4800}>
            <Direction1 city={city} mode="desktop" />
          </DCArtboard>
          {tweaks.showMobile && (
            <DCArtboard id="d1-mobile" label="Mobile · LP complète" width={420} height={4800}>
              <div style={{ display:'flex',justifyContent:'center',paddingTop:20,height:'100%',background:'#ECECEE',boxSizing:'border-box' }}>
                <PhoneFrame><Direction1 city={city} mode="mobile" /></PhoneFrame>
              </div>
            </DCArtboard>
          )}
          {tweaks.showSwipe && (
            <DCArtboard id="d1-swipe" label="Desktop · swipe" width={1280} height={900}>
              <SwipeView>
                <Direction1 city={city} mode="desktop" />
              </SwipeView>
            </DCArtboard>
          )}
        </DCSection>

        <DCSection id="alt" title="Directions alternatives — aperçu hero">
          <DCArtboard id="d2-desktop" label="D2 · Hyper-local métier×ville" width={1280} height={900}>
            <Direction2 city={city} mode="desktop" />

            <Direction4 city={city} mode="desktop" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Ville">
          <TweakSelect label="Ville cible" value={tweaks.city} onChange={(v) => setTweak('city', v)}
            options={Object.entries(CITIES).map(([k,c]) => ({ value:k, label:`${c.name} (${c.canton})` }))} />
          <div style={{ fontSize:11,color:'#666',marginTop:6 }}>
            Métiers: {(METIERS_BY_CITY[cityKey]||[]).join(', ')}

        </TweakSection>
        <TweakSection label="Affichage">
          <TweakToggle label="Vue mobile" value={tweaks.showMobile} onChange={(v) => setTweak('showMobile', v)} />

        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
