<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Google Tag Manager -->

  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-TBKNZL7');</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Google Ads pour Claude — Lutie</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'ClashDisplay';
      src: url('https://website-off-eta.vercel.app/fonts/ClashDisplay-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: 'BDOGrotesk';
      src: url('https://website-off-eta.vercel.app/fonts/BDOGrotesk-VF.ttf') format('truetype');
      font-weight: 100 900; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'BDOGrotesk', 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #fff6df 40%, #ffedb3 70%, #ffc731 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─ Logo bar ─────────────────────────────── */
    .topbar {
      display: flex;
      justify-content: center;
      padding: 28px 24px 0;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-family: 'ClashDisplay', 'Plus Jakarta Sans', sans-serif;
      font-size: 22px; font-weight: 500;
      color: #19345c; letter-spacing: -0.02em;
      text-decoration: none;
    }

    /* ─ Main wrapper ─────────────────────────── */
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* ─ Video ────────────────────────────────── */
    .video-frame {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(25,52,92,0.16), 0 4px 16px rgba(25,52,92,0.08);
      aspect-ratio: 16 / 9;
      background: #19345c;
    }
    .video-frame iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ─ Lead capture form ────────────────────── */
    .lead-card {
      width: 100%;
      background: #fff;
      border-radius: 20px;
      padding: 36px 40px 40px;
      box-shadow: 0 8px 40px rgba(25,52,92,0.12), 0 2px 8px rgba(25,52,92,0.06);
    }
    .lead-card__label {
      display: block;
      text-align: center;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #19345c; opacity: 0.45;
      margin-bottom: 10px;
    }
    .lead-card__title {
      text-align: center;
      font-family: 'ClashDisplay', 'Plus Jakarta Sans', sans-serif;
      font-size: 24px; font-weight: 500;
      color: #19345c; margin: 0 0 28px;
      line-height: 1.25;
    }
    .lead-form { display: flex; flex-direction: column; gap: 14px; }
    .lead-form input {
      width: 100%; box-sizing: border-box;
      padding: 14px 18px;
      border: 1.5px solid rgba(25,52,92,0.15);
      border-radius: 12px;
      font-family: 'BDOGrotesk', 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; color: #19345c;
      background: #fafafa;
      outline: none;
      transition: border-color .15s;
    }
    .lead-form input:focus { border-color: #FCB002; background: #fff; }
    .lead-form input::placeholder { color: rgba(25,52,92,0.35); }
    .lead-form__submit {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 16px 32px;
      border-radius: 999px;
      background: #19345c;
      color: #FCB002;
      font-family: 'BDOGrotesk', 'Plus Jakarta Sans', sans-serif;
      font-size: 16px; font-weight: 800;
      border: none; cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 4px 20px rgba(14,21,53,0.22);
      margin-top: 4px;
    }
    .lead-form__submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(14,21,53,0.28);
    }
    .lead-form__submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .lead-success {
      display: none; flex-direction: column; align-items: center;
      gap: 12px; text-align: center; padding: 8px 0;
    }
    .lead-success__icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: #FCB002;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .lead-success h3 {
      margin: 0; font-size: 20px; font-weight: 700; color: #19345c;
    }
    .lead-success p {
      margin: 0; font-size: 14px; color: rgba(25,52,92,0.65); line-height: 1.6;
    }
    .lead-error {
      display: none;
      padding: 12px 16px;
      background: #fff0f0; border-radius: 10px;
      font-size: 14px; color: #c0392b; text-align: center;
    }

    .calendly-inline-widget {
      width: 100% !important;
      min-width: 0 !important;
    }

    @media (max-width: 768px) {
      .wrap { padding: 32px 16px 40px; gap: 28px; }
      .lead-card { padding: 28px 24px 32px; }
    }

    @media (max-width: 560px) {
      .wrap { padding: 24px 0 32px; gap: 24px; }
      .video-frame { border-radius: 0; }
      .lead-card { border-radius: 0; }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TBKNZL7" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div class="topbar">
    <a href="https://website-off-eta.vercel.app" class="logo">
      <img src="https://website-off-eta.vercel.app/images/Groupe-1721-3.png" alt="Lutie" style="height:34px;width:auto;" />
    </a>
  </div>

  <div class="wrap">

    <!-- 1. Vidéo YouTube -->
    <div class="video-frame">
      <iframe
        src="https://www.youtube.com/embed/fEPzutWKSTg?autoplay=1&mute=1&rel=0&modestbranding=1"
        title="Skill Google Ads pour Claude"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <!-- 2. Lead capture form -->
    <div class="lead-card">
      <span class="lead-card__label">Skill + MCP Google Ads pour Claude</span>
      <h2 class="lead-card__title">Recevez le skill<br>gratuitement par email</h2>

      <div id="lead-error" class="lead-error"></div>

      <form class="lead-form" id="lead-form">
        <input type="text"  name="name"    placeholder="Votre prénom et nom"    required autocomplete="name" />
        <input type="email" name="email"   placeholder="Votre email professionnel" required autocomplete="email" />
        <input type="text"  name="company" placeholder="Nom de votre entreprise"  required autocomplete="organization" />
        <button type="submit" class="lead-form__submit" id="lead-submit">
          Recevoir le skill gratuitement ☀️
        </button>
      </form>

      <div class="lead-success" id="lead-success">
        <div class="lead-success__icon">☀️</div>
        <h3>C'est dans votre boîte !</h3>
        <p>Le skill Google Ads pour Claude vient de vous être envoyé.<br>Vérifiez vos spams si besoin.</p>
      </div>
    </div>

    <!-- BookIt Iframe -->
    <iframe
      src="https://calendly-ebon.vercel.app/agence-lutie/appel-d-couverte?iframe=true"
      width="100%"
      height="950"
      frameborder="0"
      style="border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%;"
    ></iframe>

  </div>

  <script>
    const form    = document.getElementById('lead-form');
    const submit  = document.getElementById('lead-submit');
    const success = document.getElementById('lead-success');
    const error   = document.getElementById('lead-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.style.display = 'none';
      submit.disabled = true;
      submit.textContent = 'Envoi en cours…';

      const data = {
        name:    form.name.value.trim(),
        email:   form.email.value.trim(),
        company: form.company.value.trim(),
      };

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await res.json();

        if (!res.ok || !json.success) {
          throw new Error(json.error || 'Une erreur est survenue.');
        }

        window.location.href = '/merci';
      } catch (err) {
        error.textContent = err.message || 'Une erreur est survenue. Réessayez.';
        error.style.display = 'block';
        submit.disabled = false;
        submit.textContent = 'Recevoir le skill gratuitement ☀️';
      }
    });
  </script>
</body>
</html>
