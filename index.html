<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Google Ads pour Claude — Lutie</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'ClashDisplay';
      src: url('https://website-off-eta.vercel.app/fonts/ClashDisplay-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: 'BDOGrotesk';
      src: url('https://website-off-eta.vercel.app/fonts/BDOGrotesk-VF.ttf') format('truetype');
      font-weight: 100 900; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'BDOGrotesk', 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(160deg, #ffc731 0%, #ffedb3 35%, #fff6df 65%, #ffffff 100%);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─ Logo bar ─────────────────────────────── */
    .topbar {
      display: flex;
      justify-content: center;
      padding: 28px 24px 0;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-family: 'ClashDisplay', 'Plus Jakarta Sans', sans-serif;
      font-size: 22px; font-weight: 500;
      color: #19345c; letter-spacing: -0.02em;
      text-decoration: none;
    }

    /* ─ Main wrapper ─────────────────────────── */
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* ─ Video ────────────────────────────────── */
    .video-frame {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(14,21,53,0.16), 0 4px 16px rgba(14,21,53,0.08);
      aspect-ratio: 16 / 9;
      background: #19345c;
    }
    .video-frame iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ─ Download button ──────────────────────── */
    .btn-dl {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 18px 48px;
      border-radius: 999px;
      background: #19345c;
      color: #fff;
      font-family: 'BDOGrotesk', 'Plus Jakarta Sans', sans-serif;
      font-size: 17px; font-weight: 700;
      text-decoration: none;
      border: none; cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .15s;
      box-shadow: 0 4px 20px rgba(14,21,53,0.22);
    }
    .btn-dl:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(14,21,53,0.28);
      background: #19345c;
    }
    .btn-dl__icon {
      width: 26px; height: 26px; border-radius: 8px;
      background: #cc785c;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-dl__icon svg { width: 15px; height: 15px; fill: #fff; }

    /* ─ Calendly ─────────────────────────────── */
    .calendly-wrap {
      width: 100%;
    }
    .calendly-inline-widget {
      width: 100% !important;
      min-width: 0 !important;
    }

    @media (max-width: 560px) {
      .wrap { padding: 32px 16px 60px; gap: 28px; }
      .btn-dl { padding: 16px 32px; font-size: 16px; width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="https://website-off-eta.vercel.app" class="logo">
      <img src="https://website-off-eta.vercel.app/images/Groupe-1721-3.png" alt="Lutie" style="height:34px;width:auto;" />
    </a>
  </div>

  <div class="wrap">

    <!-- 1. Vidéo YouTube -->
    <div class="video-frame">
      <!--
        Remplacez YOUR_VIDEO_ID par l'ID de votre vidéo YouTube
        Ex : https://youtu.be/dQw4w9WgXcQ → ID = dQw4w9WgXcQ
      -->
      <iframe
        src="https://www.youtube.com/embed/YOUR_VIDEO_ID?rel=0&modestbranding=1"
        title="Skill Google Ads pour Claude"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        loading="lazy">
      </iframe>
    </div>

    <!-- 2. Bouton télécharger le skill -->
    <a href="https://claude.ai/download" target="_blank" rel="noopener" class="btn-dl">
      <span class="btn-dl__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
      </span>
      Télécharger le skill Claude
    </a>

    <!-- 3. Calendly -->
    <div class="calendly-wrap">
      <div class="calendly-inline-widget" data-url="https://calendly.com/agence-lutie/googleads?primary_color=fcb002&background_color=fff6df&text_color=0e1535&hide_gdpr_banner=1" style="width:100%;height:700px;"></div>
      <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    </div>

  </div>

</body>
</html>
